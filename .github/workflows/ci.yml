name: CI

on:
  push:
    branches: [main, master, "fix/**", "feat/**"]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: check (typecheck · test · build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # npm run check = typecheck + test + build，避免重复定义两套相同命令（SPEC 20）
      - name: Check (typecheck + test + build)
        run: npm run check
